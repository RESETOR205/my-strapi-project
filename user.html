<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | 3D Market</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0f111a; color: #fff; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo-link { color: #fff; text-decoration: none; font-size: 28px; font-weight: bold; }
        .back-btn { padding: 10px 20px; background: #334155; border: none; border-radius: 8px; color: #fff; text-decoration: none; }
        .back-btn:hover { background: #475569; }
        .profile-container { display: flex; align-items: center; gap: 25px; background: #1a1d29; padding: 30px; border-radius: 16px; margin-bottom: 40px; }
        .profile-avatar { width: 100px; height: 100px; background: #4f46e5; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; text-transform: uppercase; }
        .profile-info { display: flex; flex-direction: column; gap: 8px; }
        .profile-header-row { display: flex; align-items: center; gap: 15px; }
        .profile-nick { font-size: 20px; color: #94a3b8; font-weight: normal; text-transform: lowercase; }
        .profile-rating { display: flex; align-items: center; gap: 5px; color: #f59e0b; font-size: 18px; font-weight: bold; }
        .profile-reviews { color: #64748b; font-size: 14px; }
        .profile-username { font-size: 32px; font-weight: bold; letter-spacing: 1px; }
        .section-title-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #334155; margin-bottom: 30px; }
        .section-title { font-size: 18px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; color: #94a3b8; }
        .add-product-btn { padding: 8px 16px; background: #22c55e; border: none; border-radius: 6px; color: #fff; font-weight: bold; cursor: pointer; text-decoration: none; }
        .add-product-btn:hover { background: #16a34a; }
        
        .works-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .product-card { position: relative; background: #1a1d29; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; padding: 15px; border: 1px solid transparent; transition: transform 0.3s ease, border-color 0.3s ease, opacity 0.4s ease, transform 0.4s ease; }
        .product-card:hover { transform: scale(1.03); border-color: #4f46e5; }
        .product-img { width: 100%; height: 200px; object-fit: cover; background: #0f111a; border-radius: 12px; margin-bottom: 15px; }
        .product-info { padding: 5px; display: flex; flex-direction: column; flex-grow: 1; }
        .product-title { font-size: 18px; margin-bottom: 8px; color: #fff; }
        .product-price { font-size: 20px; font-weight: bold; color: #10b981; margin-top: auto; }
        
        .delete-card-btn {
            position: absolute;
            top: 22px;
            right: 22px;
            background: rgba(239, 68, 68, 0.85);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background 0.2s ease, transform 0.1s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .delete-card-btn:hover { background: #ef4444; transform: scale(1.1); }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15,17,26,0.8); backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        .modal-content { background: #1a1d29; padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; position: relative; max-height: 90vh; overflow-y: auto; }
        .close-modal { position: absolute; right: 20px; top: 20px; font-size: 28px; color: #94a3b8; cursor: pointer; }
        .close-modal:hover { color: #fff; }
        .modal h2 { margin-bottom: 20px; font-size: 22px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 14px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; background: #0f111a; border: 1px solid #334155; border-radius: 6px; color: #fff; font-size: 14px; outline: none; }
        .submit-btn { width: 100%; padding: 12px; background: #4f46e5; border: none; border-radius: 6px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .submit-btn:hover { background: #4338ca; }

        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            z-index: 2000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            display: none;
            animation: slideIn 0.3s ease forwards;
        }
        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="toast" class="toast-notification"></div>

    <header>
        <a href="index.html" class="logo-link">3D Market</a>
        <a href="index.html" class="back-btn">— На главную</a>
    </header>

    <div class="profile-container">
        <div class="profile-avatar" id="user-avatar">?</div>
        <div class="profile-info">
            <div class="profile-header-row">
                <div class="profile-username" id="user-name">Загрузка...</div>
                <div class="profile-nick" id="user-nick">@username</div>
            </div>
            <div class="profile-header-row">
                <div class="profile-rating">★ 5.0</div>
                <div class="profile-reviews">(0 отзывов)</div>
            </div>
        </div>
    </div>

    <div class="section-title-bar">
        <div class="section-title">Лучшие работы</div>
        <button class="add-product-btn" id="openModalBtn">+ Добавить модель</button>
    </div>

    <div class="works-grid" id="user-models-grid">
        <div style="color: #94a3b8; padding: 20px;">Загрузка ваших моделей...</div>
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModalBtn">&times;</span>
            <h2>Опубликовать новую работу</h2>
            <form id="upload-form">
                <div class="form-group">
                    <label for="model-title">Название модели</label>
                    <input type="text" id="model-title" required placeholder="Например: Glock 17">
                </div>
                <div class="form-group">
                    <label for="model-file">Файл модели (.fbx, .obj, .zip)</label>
                    <input type="file" id="model-file" accept=".fbx,.obj,.zip" required>
                </div>
                <div class="form-group">
                    <label for="model-price">Цена (только число)</label>
                    <input type="text" id="model-price" required placeholder="19">
                </div>
                <div class="form-group">
                    <label for="model-img">Фото / Превью модели (изображение)</label>
                    <input type="file" id="model-img" accept="image/*" required>
                </div>
                <div class="form-group">
                    <label for="model-desc">Описание модели</label>
                    <textarea id="model-desc" rows="3" placeholder="Опишите вашу 3D-модель..."></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Опубликовать</button>
            </form>
        </div>
    </div>

<script>
    const STRAPI_BASE_URL = 'https://my-strapi-project-production-f85a.up.railway.app';

    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.background = isError ? '#ef4444' : '#22c55e';
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 4000);
    }

    // Сохранили и анимацию, и добавили точную отладку ответов сервера
    async function deleteModel(modelId) {
        const token = localStorage.getItem('token') || localStorage.getItem('jwt');
        if (!token) {
            alert("КРИТИЧЕСКАЯ ОШИБКА: Ключ авторизации не найден. Выйдите из аккаунта на главной и зайдите заново.");
            return;
        }

        if (!confirm(`Вы точно хотите удалить модель с ID: ${modelId}?`)) return;

        try {
            const response = await fetch(`${STRAPI_BASE_URL}/api/models/${modelId}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            // Если сервер ответил успехом (200 или 204)
            if (response.status === 200 || response.status === 204) {
                showToast("Модель успешно удалена!");
                
                // Твоя фирменная плавная анимация исчезновения карточки
                const cardEl = document.getElementById(`model-card-${modelId}`);
                if (cardEl) {
                    cardEl.style.opacity = '0';
                    cardEl.style.transform = 'scale(0.8)';
                    setTimeout(() => {
                        cardEl.remove();
                        
                        const grid = document.getElementById('user-models-grid');
                        const remainingCards = grid.querySelectorAll('[id^="model-card-"]');
                        if (remainingCards.length === 0) {
                            grid.innerHTML = '<div style="color: #94a3b8; padding: 20px;">У вас пока нет опубликованных моделей</div>';
                        }
                    }, 400);
                }
                return;
            } 
            
            // Если сервер вернул явную ошибку доступа
            if (response.status === 403) {
                alert("ОШИБКА 403 (Запрещено): Новая база Postgres отклонила запрос.\n\nРЕШЕНИЕ: В админке Strapi перейдите в Settings -> Roles -> Authenticated -> Вкладка Models -> Поставьте галочку на 'delete' и нажмите синюю кнопку SAVE!");
                return;
            }

            if (response.status === 401) {
                alert("ОШИБКА 401 (Не авторизован): Ваш токен принадлежит старой базе SQLite.\n\nРЕШЕНИЕ: Перейдите на главную страницу, нажмите 'Выйти', зарегистрируйте НОВОГО пользователя и войдите под ним.");
                return;
            }

            const errorText = await response.text();
            alert(`СБОЙ СЕРВЕРА: Статус ${response.status}\nОтвет: ${errorText}`);

        } catch (error) {
            alert(`ОШИБКА СЕТИ: Не удалось связаться с бэкендом.\nДетали: ${error.message}`);
        }
    }

    async function loadUserModels() {
        const grid = document.getElementById('user-models-grid');
        const token = localStorage.getItem('token') || localStorage.getItem('jwt');
        if (!grid) return;

        try {
            const res = await fetch(`${STRAPI_BASE_URL}/api/models?populate=*&_t=${Date.now()}`, {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!res.ok) throw new Error("Не удалось загрузить ваши работы.");

            const responseData = await res.json();
            const models = responseData.data || [];

            if (models.length === 0) {
                grid.innerHTML = '<div style="color: #94a3b8; padding: 20px;">У вас пока нет опубликованных моделей</div>';
                return;
            }

            grid.innerHTML = ''; 

            models.forEach(item => {
                const modelId = item.id;
                const attrs = item.attributes || item;
                const title = attrs.Title || "Без названия";
                const price = attrs.Price !== undefined ? attrs.Price : 0;

                let imgUrl = '';
                let previewData = attrs.Previews?.data || attrs.Previews;
                
                if (previewData) {
                    if (Array.isArray(previewData)) previewData = previewData[0];
                    if (previewData) {
                        const previewAttrs = previewData.attributes || previewData;
                        const rawUrl = previewAttrs.url || '';
                        if (rawUrl) {
                            imgUrl = rawUrl.startsWith('http') ? rawUrl : `${STRAPI_BASE_URL}${rawUrl}`;
                        }
                    }
                }

                const card = document.createElement('div');
                card.className = 'product-card';
                card.id = `model-card-${modelId}`;
                card.innerHTML = `
                    <button class="delete-card-btn" onclick="deleteModel(${modelId})">&times;</button>
                    ${imgUrl ? `<img src="${imgUrl}" class="product-img" alt="${title}">` : '<div class="product-img" style="background: #0f111a;"></div>'}
                    <div class="product-info">
                        <div class="product-title">${title}</div>
                        <div class="product-price">${price} $</div>
                    </div>
                `;
                grid.appendChild(card);
            });

        } catch (error) {
            grid.innerHTML = `<div style="color: #ef4444; padding: 20px;">Ошибка загрузки: ${error.message}</div>`;
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        const storedUsername = localStorage.getItem('username') || "Пользователь";
        document.getElementById('user-name').textContent = storedUsername;
        document.getElementById('user-nick').textContent = '@' + storedUsername.toLowerCase().replace(/\s+/g, '');
        document.getElementById('user-avatar').textContent = storedUsername.charAt(0);
        
        loadUserModels();
    });

    const modal = document.getElementById("myModal");
    const btn = document.getElementById("openModalBtn");
    const span = document.getElementById("closeModalBtn");

    if (btn && modal && span) {
        btn.onclick = function() { modal.style.display = "flex"; }
        span.onclick = function() { modal.style.display = "none"; }
        window.onclick = function(event) { if (event.target == modal) modal.style.display = "none"; }
    }

    document.getElementById('upload-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const token = localStorage.getItem('token') || localStorage.getItem('jwt');
        if (!token) { showToast("Ошибка авторизации!", true); return; }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = "Загрузка файлов...";

        const fileInput = document.getElementById('model-file').files[0];
        const imgInput = document.getElementById('model-img').files[0];

        try {
            async function uploadToMediaLibrary(file) {
                const fileData = new FormData();
                fileData.append('files', file);
                const res = await fetch(`${STRAPI_BASE_URL}/api/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: fileData
                });
                if (!res.ok) throw new Error("Не удалось загрузить медиафайлы");
                const uploadedFiles = await res.json();
                return uploadedFiles[0].id;
            }

            const fbxId = await uploadToMediaLibrary(fileInput);
            const imgId = await uploadToMediaLibrary(imgInput);
            const dummyFile = new File(["placeholder_content"], "empty.glb", { type: "application/octet-stream" });
            const glbId = await uploadToMediaLibrary(dummyFile);

            const finalPayload = {
                data: {
                    Title: document.getElementById('model-title').value.trim(),
                    Price: parseFloat(document.getElementById('model-price').value.trim()) || 0,
                    Description: document.getElementById('model-desc').value.trim(),
                    ModelFBX: fbxId,
                    Previews: [imgId], 
                    ModelGLB: glbId
                }
            };

            const response = await fetch(`${STRAPI_BASE_URL}/api/models`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(finalPayload)
            });

            if (response.ok) {
                showToast("Модель успешно создана в базе Postgres!");
                document.getElementById('upload-form').reset();
                if (modal) modal.style.display = "none";
                loadUserModels();
            } else {
                showToast("Ошибка сохранения карточки на сервере.", true);
            }
        } catch (error) {
            showToast(`Критический сбой: ${error.message}`, true);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Опубликовать";
        }
    });
</script>
</body>
</html>
