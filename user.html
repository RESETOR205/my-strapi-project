<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | 3D Market</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0e14;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 40px;
            background-color: #121721;
            border-bottom: 1px solid #1e2638;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
        }
        .logo span {
            color: #3b82f6;
        }

        .btn-back {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            background-color: #1e2638;
            color: #cbd5e1;
            text-decoration: none;
            border: 1px solid #2d3748;
            transition: background 0.2s;
        }
        .btn-back:hover {
            background-color: #2d3748;
            color: #fff;
        }

        /* Главная секция */
        main {
            flex: 1;
            padding: 30px 40px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        /* Карточка профиля */
        .profile-card {
            background-color: #121721;
            border: 1px solid #1e2638;
            border-radius: 12px;
            padding: 28px 32px;
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 36px;
        }

        .profile-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background-color: #4f46e5;
            color: #ffffff;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .profile-header-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .profile-name {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
        }

        .profile-handle {
            font-size: 15px;
            color: #64748b;
            font-weight: 400;
        }

        .profile-rating {
            font-size: 14px;
            color: #f59e0b;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profile-rating span {
            color: #64748b;
        }

        /* Заголовок Лучшие работы */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .btn-add-model {
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            background-color: #10b981;
            color: #ffffff;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-add-model:hover {
            background-color: #059669;
        }

        /* Сетка работ / Пустое состояние */
        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .empty-state {
            grid-column: 1 / -1;
            color: #64748b;
            font-size: 14px;
            padding-top: 10px;
        }

        .model-card {
            background-color: #121721;
            border: 1px solid #1e2638;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .model-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .model-price {
            color: #10b981;
            font-weight: bold;
        }

        /* Модальное окно добавления */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background-color: #121721;
            border: 1px solid #1e2638;
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            padding: 28px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: #64748b;
            font-size: 22px;
            cursor: pointer;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #fff;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #1e2638;
            background-color: #0b0e14;
            color: #fff;
            outline: none;
        }

        /* Уведомление Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            background-color: #10b981;
            color: #fff;
            font-size: 14px;
            display: none;
            z-index: 2000;
        }
        .toast.error {
            background-color: #ef4444;
        }
    </style>
</head>
<body>

    <!-- Шапка -->
    <header>
        <a href="index.html" class="logo">3D <span>Market</span></a>
        <a href="index.html" class="btn-back">— На главную</a>
    </header>

    <!-- Основное содержимое -->
    <main>
        <!-- Карточка профиля -->
        <div class="profile-card">
            <div class="profile-avatar" id="user-avatar">П</div>
            <div class="profile-info">
                <div class="profile-header-row">
                    <h1 class="profile-name" id="user-name">Пользователь</h1>
                    <span class="profile-handle" id="user-handle">@пользователь</span>
                </div>
                <div class="profile-rating">
                    ★ 5.0 <span>(0 отзывов)</span>
                </div>
            </div>
        </div>

        <!-- Секция лучших работ -->
        <div class="section-header">
            <h2 class="section-title">ЛУЧШИЕ РАБОТЫ</h2>
            <button class="btn-add-model" id="open-upload-btn">+ Добавить модель</button>
        </div>

        <div class="models-grid" id="user-models-grid">
            <div class="empty-state">
                У вас пока нет опубликованных моделей
            </div>
        </div>
    </main>

    <!-- Модальное окно создания модели -->
    <div class="modal-overlay" id="upload-modal">
        <div class="modal-content">
            <button class="modal-close" id="close-upload-btn">&times;</button>
            <h3 class="modal-title">Добавить 3D-модель</h3>

            <form id="upload-form">
                <div class="form-group">
                    <label>Название модели</label>
                    <input type="text" id="model-title" required placeholder="Например: Glock 17">
                </div>

                <div class="form-group">
                    <label>Категория</label>
                    <select id="model-category" required>
                        <option value="Персонажи">Персонажи</option>
                        <option value="Оружие">Оружие</option>
                        <option value="Окружение">Окружение</option>
                        <option value="Транспорт">Транспорт</option>
                        <option value="Архитектура">Архитектура</option>
                        <option value="Предметы">Предметы</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Цена (в ₽, 0 — бесплатно)</label>
                    <input type="number" id="model-price" required placeholder="0" min="0">
                </div>

                <button type="submit" class="btn-add-model" id="submit-btn" style="width: 100%; margin-top: 10px;">Опубликовать</button>
            </form>
        </div>
    </div>

    <!-- Уведомления -->
    <div class="toast" id="toast"></div>

    <script>
        const STRAPI_BASE_URL = 'https://my-strapi-project-production-f85a.up.railway.app';
        let currentUser = null;

        const userNameEl = document.getElementById('user-name');
        const userHandleEl = document.getElementById('user-handle');
        const userAvatarEl = document.getElementById('user-avatar');

        const uploadModal = document.getElementById('upload-modal');
        const openUploadBtn = document.getElementById('open-upload-btn');
        const closeUploadBtn = document.getElementById('close-upload-btn');
        const uploadForm = document.getElementById('upload-form');
        const submitBtn = document.getElementById('submit-btn');
        const toastEl = document.getElementById('toast');

        function showToast(message, isError = false) {
            toastEl.textContent = message;
            toastEl.className = 'toast' + (isError ? ' error' : '');
            toastEl.style.display = 'block';
            setTimeout(() => { toastEl.style.display = 'none'; }, 4000);
        }

        // Загрузка данных текущего пользователя
        async function loadUserProfile() {
            const token = localStorage.getItem('jwt');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const res = await fetch(`${STRAPI_BASE_URL}/api/users/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) throw new Error('Сессия недействительна');

                currentUser = await res.json();

                // Подставляем данные вошедшего пользователя
                const username = currentUser.username || 'Пользователь';
                userNameEl.textContent = username;
                userHandleEl.textContent = `@${username.toLowerCase()}`;
                userAvatarEl.textContent = username.charAt(0).toUpperCase();

                loadUserModels();
            } catch (err) {
                console.error(err);
                localStorage.removeItem('jwt');
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            }
        }

        // Загрузка моделей текущего пользователя
        async function loadUserModels() {
            const grid = document.getElementById('user-models-grid');
            if (!currentUser) return;

            try {
                const res = await fetch(`${STRAPI_BASE_URL}/api/models?populate=*`);
                if (!res.ok) return;

                const responseData = await res.json();
                const allModels = responseData.data || [];

                const userModels = allModels.filter(item => {
                    const m = item.attributes || item;
                    return m.author === currentUser.username;
                });

                if (userModels.length === 0) {
                    grid.innerHTML = '<div class="empty-state">У вас пока нет опубликованных моделей</div>';
                    return;
                }

                grid.innerHTML = userModels.map(item => {
                    const m = item.attributes || item;
                    return `
                        <div class="model-card">
                            <div class="model-title">${m.title || 'Без названия'}</div>
                            <div class="model-price">${m.price ? m.price + ' ₽' : 'Бесплатно'}</div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Ошибка загрузки моделей:', err);
            }
        }

        // Добавление новой модели
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('jwt');
            
            const title = document.getElementById('model-title').value;
            const category = document.getElementById('model-category').value;
            const price = Number(document.getElementById('model-price').value);

            submitBtn.disabled = true;
            submitBtn.textContent = 'Публикация...';

            try {
                const response = await fetch(`${STRAPI_BASE_URL}/api/models`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        data: {
                            title: title,
                            category: category,
                            price: price,
                            author: currentUser.username
                        }
                    })
                });

                if (response.ok) {
                    showToast('Модель успешно создана!');
                    uploadForm.reset();
                    uploadModal.classList.remove('active');
                    loadUserModels();
                } else {
                    const errJson = await response.json().catch(() => ({}));
                    const strapiErrorMessage = errJson?.error?.message || 'Ошибка сохранения';
                    showToast(`Ошибка: ${strapiErrorMessage}`, true);
                }
            } catch (error) {
                showToast(`Сбой: ${error.message}`, true);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Опубликовать';
            }
        });

        openUploadBtn.addEventListener('click', () => uploadModal.classList.add('active'));
        closeUploadBtn.addEventListener('click', () => uploadModal.classList.remove('active'));
        uploadModal.addEventListener('click', (e) => {
            if (e.target === uploadModal) uploadModal.classList.remove('active');
        });

        document.addEventListener('DOMContentLoaded', loadUserProfile);
    </script>
</body>
</html>
