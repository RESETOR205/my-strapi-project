<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали модели | 3D Market</title>
    
    <!-- Подключаем 3D-движок Google <model-viewer> -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0f111a; color: #fff; padding: 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo-link { color: #fff; text-decoration: none; font-size: 28px; font-weight: bold; }
        .back-btn { padding: 10px 20px; background: #334155; border: none; border-radius: 8px; color: #fff; text-decoration: none; font-weight: bold; }
        .back-btn:hover { background: #475569; }

        .product-container { display: grid; grid-template-columns: 1fr 380px; gap: 30px; max-width: 1200px; margin: 0 auto; }
        @media (max-width: 900px) { .product-container { grid-template-columns: 1fr; } }

        /* Левая часть: просмотрщик и галерея */
        .viewer-section { display: flex; flex-direction: column; gap: 15px; }
        
        .main-media-box { 
            background: #1a1d29; 
            border-radius: 16px; 
            padding: 10px; 
            border: 1px solid #334155; 
            position: relative; 
            height: 520px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Главное изображение-картинка */
        .main-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
            display: block;
        }

        /* 3D-плеер */
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #0f111a;
            border-radius: 12px;
            display: none; /* Включается по клику */
        }

        /* Кнопка "Загрузить 3D" поверх картинки (стиль CGTrader) */
        .btn-load-3d {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(79, 70, 229, 0.9);
            color: #fff;
            padding: 16px 32px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            transition: all 0.2s ease;
            z-index: 10;
            display: none; /* Показывается если есть 3D файл */
            align-items: center;
            gap: 10px;
        }
        .btn-load-3d:hover { background: #4338ca; transform: translate(-50%, -50%) scale(1.05); }

        .viewer-controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 17, 26, 0.85);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: #94a3b8;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            z-index: 11;
        }

        /* Лента миниатюр (Thumbnails) */
        .thumbnails-list {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .thumb-item {
            width: 80px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            background: #1a1d29;
            transition: border-color 0.2s ease;
            flex-shrink: 0;
        }
        .thumb-item:hover, .thumb-item.active {
            border-color: #6366f1;
        }

        .thumb-3d-btn {
            width: 80px;
            height: 60px;
            border-radius: 8px;
            background: #312e81;
            color: #818cf8;
            border: 2px solid #4f46e5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
            gap: 2px;
            transition: all 0.2s ease;
        }
        .thumb-3d-btn:hover, .thumb-3d-btn.active {
            background: #4338ca;
            color: #fff;
            border-color: #6366f1;
        }

        /* Правая колонка: Описание и Покупка */
        .details-card { background: #1a1d29; border-radius: 16px; padding: 25px; border: 1px solid #334155; display: flex; flex-direction: column; gap: 20px; height: fit-content; }
        .product-title { font-size: 26px; font-weight: bold; line-height: 1.2; }
        .product-price { font-size: 32px; font-weight: bold; color: #10b981; }
        
        .buy-btn {
            width: 100%;
            padding: 16px;
            background: #4f46e5;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .buy-btn:hover { background: #4338ca; }

        .specs-list { background: #0f111a; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .spec-item { display: flex; justify-content: space-between; border-bottom: 1px solid #1e293b; padding-bottom: 6px; }
        .spec-item:last-child { border-bottom: none; padding-bottom: 0; }
        .spec-label { color: #94a3b8; }
        .spec-value { color: #fff; font-weight: bold; }

        .description-box { color: #cbd5e1; font-size: 15px; line-height: 1.6; white-space: pre-wrap; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-link">3D Market</a>
        <a href="index.html" class="back-btn">← На главную</a>
    </header>

    <div class="product-container">
        <!-- Левая колонка: Просмотрщик + Галерея миниатюр -->
        <div class="viewer-section">
            <div class="main-media-box">
                <!-- Картинка превью -->
                <img id="main-image" class="main-image" src="" alt="Превью модели">
                
                <!-- Кнопка поверх картинки в стиле CGTrader -->
                <button id="btn-load-3d" class="btn-load-3d">
                    <span>🎲</span> Click to load 3D View
                </button>

                <!-- 3D Интерактивный плеер -->
                <model-viewer 
                    id="3d-viewer" 
                    alt="3D Предосмотр модели" 
                    camera-controls 
                    auto-rotate 
                    shadow-intensity="1.5"
                    exposure="1">
                </model-viewer>

                <div id="viewer-hint" class="viewer-controls-hint">🖱️ Зажмите ЛКМ для вращения • Колесико для зума</div>
            </div>

            <!-- Нижняя лента миниатюр -->
            <div class="thumbnails-list" id="thumbnails-container">
                <!-- Сюда динамически добавятся картинки и кнопка 3D -->
            </div>
        </div>

        <!-- Правая колонка: Информация о товаре -->
        <div class="details-card">
            <h1 class="product-title" id="p-title">Загрузка...</h1>
            <div class="product-price" id="p-price">0 $</div>
            
            <button class="buy-btn" id="p-buy-btn">Скачать / Купить</button>

            <div class="specs-list">
                <div class="spec-item">
                    <span class="spec-label">Категория:</span>
                    <span class="spec-value" id="p-category">—</span>
                </div>
                <div class="spec-item">
                    <span class="spec-label">Полигоны:</span>
                    <span class="spec-value" id="p-polygons">—</span>
                </div>
                <div class="spec-item">
                    <span class="spec-label">Формат файлов:</span>
                    <span class="spec-value">FBX / GLB</span>
                </div>
            </div>

            <div class="description-box" id="p-desc">
                Загрузка описания...
            </div>
        </div>
    </div>

<script>
    const STRAPI_BASE_URL = 'https://my-strapi-project-production-f85a.up.railway.app';
    const FALLBACK_IMG = 'https://placehold.co/800x600/1a1d29/94a3b8?text=Нет+превью';

    let currentGlbUrl = "";
    let imageGallery = [];

    const mainImgEl = document.getElementById('main-image');
    const viewerEl = document.getElementById('3d-viewer');
    const btn3d = document.getElementById('btn-load-3d');
    const hintEl = document.getElementById('viewer-hint');
    const thumbsContainer = document.getElementById('thumbnails-container');

    // Функция переключения в 3D режим
    function activate3DView() {
        if (!currentGlbUrl) return;
        
        mainImgEl.style.display = 'none';
        btn3d.style.display = 'none';
        
        viewerEl.style.display = 'block';
        if (!viewerEl.getAttribute('src')) {
            viewerEl.setAttribute('src', currentGlbUrl);
        }
        hintEl.style.display = 'block';

        // Обновляем выделение в миниатюрах
        document.querySelectorAll('.thumb-item, .thumb-3d-btn').forEach(el => el.classList.remove('active'));
        const active3dThumb = document.getElementById('thumb-3d-icon');
        if (active3dThumb) active3dThumb.classList.add('active');
    }

    // Функция переключения на картинку
    function activateImageView(imgUrl, index) {
        viewerEl.style.display = 'none';
        hintEl.style.display = 'none';
        
        mainImgEl.src = imgUrl;
        mainImgEl.style.display = 'block';

        if (currentGlbUrl) {
            btn3d.style.display = 'flex';
        }

        // Обновляем активную миниатюру
        document.querySelectorAll('.thumb-item, .thumb-3d-btn').forEach(el => el.classList.remove('active'));
        const targetThumb = document.getElementById(`thumb-img-${index}`);
        if (targetThumb) targetThumb.classList.add('active');
    }

    async function loadProductDetails() {
        const urlParams = new URLSearchParams(window.location.search);
        const modelId = urlParams.get('id');

        if (!modelId) {
            alert("Модель не найдена!");
            window.location.href = "index.html";
            return;
        }

        try {
            const res = await fetch(`${STRAPI_BASE_URL}/api/models/${modelId}?populate=*`);
            if (!res.ok) throw new Error("Не удалось загрузить данные модели");

            const responseData = await res.json();
            const item = responseData.data;
            const attrs = item.attributes || item;

            // Заполняем текстовую информацию
            document.getElementById('p-title').textContent = attrs.Title || "Без названия";
            document.getElementById('p-price').textContent = `${attrs.Price !== undefined ? attrs.Price : 0} $`;
            document.getElementById('p-polygons').textContent = attrs.Polygons || "Не указано";
            
            const categoryValue = attrs.Category || attrs.category || "props";
            document.getElementById('p-category').textContent = categoryValue.toUpperCase();
            document.getElementById('p-desc').textContent = attrs.Description || "Описание отсутствует.";

            // 1. Извлекаем изображения превью
            let rawPreviews = attrs.Previews || item.Previews;
            if (rawPreviews && rawPreviews.data) rawPreviews = rawPreviews.data;
            
            imageGallery = [];
            if (rawPreviews) {
                const previewsArray = Array.isArray(rawPreviews) ? rawPreviews : [rawPreviews];
                previewsArray.forEach(p => {
                    const target = p.attributes || p;
                    const url = target.url || p.url || '';
                    if (url) {
                        const fullUrl = url.startsWith('http') ? url : `${STRAPI_BASE_URL}${url}`;
                        imageGallery.push(fullUrl);
                    }
                });
            }

            if (imageGallery.length === 0) {
                imageGallery.push(FALLBACK_IMG);
            }

            // Устанавливаем главное первое изображение
            mainImgEl.src = imageGallery[0];

            // 2. Извлекаем 3D файл (.GLB)
            const rawGlb = attrs.ModelGLB || item.ModelGLB;
            if (rawGlb) {
                const target = rawGlb.data ? rawGlb.data.attributes : (rawGlb.attributes || rawGlb);
                const url = target?.url || "";
                const size = target?.size || 0;
                
                // Проверяем, что это не пустая заглушка (размер больше 1 КБ)
                if (url && (size > 1 || !url.includes('empty.glb'))) {
                    currentGlbUrl = url.startsWith('http') ? url : `${STRAPI_BASE_URL}${url}`;
                }
            }

            // Показываем кнопку 3D поверх изображения, если GLB загружен
            if (currentGlbUrl) {
                btn3d.style.display = 'flex';
                btn3d.onclick = activate3DView;
            }

            // 3. Рендерим нижнюю ленту миниатюр
            thumbsContainer.innerHTML = '';

            // Кнопка 3D в миниатюрах (если есть файл)
            if (currentGlbUrl) {
                const btn3dThumb = document.createElement('div');
                btn3dThumb.className = 'thumb-3d-btn';
                btn3dThumb.id = 'thumb-3d-icon';
                btn3dThumb.innerHTML = '<span>🎲</span> 3D VIEW';
                btn3dThumb.onclick = activate3DView;
                thumbsContainer.appendChild(btn3dThumb);
            }

            // Миниатюры картинок
            imageGallery.forEach((url, index) => {
                const imgThumb = document.createElement('img');
                imgThumb.className = `thumb-item ${index === 0 ? 'active' : ''}`;
                imgThumb.id = `thumb-img-${index}`;
                imgThumb.src = url;
                imgThumb.onclick = () => activateImageView(url, index);
                thumbsContainer.appendChild(imgThumb);
            });

        } catch (error) {
            console.error("Ошибка:", error);
            document.getElementById('p-title').textContent = "Ошибка загрузки карточки";
        }
    }

    document.addEventListener("DOMContentLoaded", loadProductDetails);
</script>
</body>
</html>
