<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали модели | 3D Market</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0f111a; color: #fff; padding: 20px; min-height: 100vh; }

        header { width: 100%; max-width: 1200px; margin: 0 auto 30px auto; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 20px; }
        .logo-link { color: #38bdf8; text-decoration: none; font-size: 24px; font-weight: bold; }
        
        .back-btn { display: inline-block; color: #38bdf8; text-decoration: none; font-weight: 600; transition: color 0.2s; }
        .back-btn:hover { color: #0ea5e9; }

        /* Двухколоночный контейнер */
        .product-container { display: flex; gap: 30px; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; }

        /* Левая колонка — Контент товара */
        .main-content { flex: 2; min-width: 300px; }

        /* Интерактивный слайдер по твоей схеме из Paint */
        .slider-wrapper { position: relative; width: 100%; height: 480px; background: #0f111a; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #334155; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .slider-img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        /* Интерактивные зоны наведения по краям */
        .hover-zone { position: absolute; top: 0; height: 100%; width: 33%; z-index: 10; }
        .hover-zone.left { left: 0; cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>'), w-resize; }
        .hover-zone.right { right: 0; cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>'), e-resize; }
        .hover-zone.left:hover { background: linear-gradient(to right, rgba(255,255,255,0.02), transparent); }
        .hover-zone.right:hover { background: linear-gradient(to left, rgba(255,255,255,0.02), transparent); }

        /* Индикаторы-полоски снизу картинки */
        .slider-indicators { position: absolute; bottom: 20px; display: flex; gap: 8px; z-index: 15; background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 20px; backdrop-filter: blur(3px); }
        .indicator-line { width: 25px; height: 3px; background: rgba(255, 255, 255, 0.2); border-radius: 2px; transition: background 0.3s ease, width 0.3s ease; }
        .indicator-line.active { background: #38bdf8; width: 40px; }

        /* Форматы */
        .formats-container { margin: 20px 0; }
        .format-badge { display: inline-block; background: #1e293b; color: #94a3b8; padding: 6px 12px; border-radius: 6px; font-weight: 700; font-size: 0.85rem; margin-right: 8px; text-transform: uppercase; border: 1px solid #334155; }

        /* Описание модели */
        .description-box { background: #1a1d29; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-top: 20px; }
        .description-box h3 { margin-bottom: 10px; color: #38bdf8; font-size: 1.2rem; }
        .description-box p { color: #cbd5e1; line-height: 1.6; white-space: pre-line; }

        /* Правая колонка — Панель покупки и Автор */
        .sidebar { flex: 1; min-width: 280px; display: flex; flex-direction: column; gap: 20px; }
        .action-card, .author-card { background: #1a1d29; padding: 25px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .product-title { font-size: 1.8rem; margin: 0 0 10px 0; font-weight: 700; color: #fff; }
        .product-price { font-size: 2.2rem; color: #10b981; font-weight: 700; margin: 0 0 15px 0; }
        
        /* Вывод количества полигонов */
        .product-spec-row { margin-bottom: 20px; color: #94a3b8; font-size: 0.95rem; }
        .product-spec-row strong { color: #38bdf8; }

        .checkout-btn { background: #4f46e5; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s; }
        .checkout-btn:hover { background: #4338ca; }

        /* Карточка автора */
        .author-info { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .author-avatar { width: 50px; height: 50px; border-radius: 50%; background: #4f46e5; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
        .author-name { font-weight: 600; font-size: 1.1rem; color: #fff; }

        .loading { text-align: center; padding: 100px; font-size: 1.2rem; color: #94a3b8; width: 100%; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-link">📦 3D Market</a>
        <a href="index.html" class="back-btn">← Вернуться к витрине</a>
    </header>

    <div id="product-page" style="width: 100%;">
        <div class="loading">Загрузка спецификаций модели...</div>
    </div>

<script>
    const STRAPI_BASE_URL = 'https://my-strapi-project-production-f85a.up.railway.app';
    let images = [];       
    let currentIndex = 0;  

    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (!productId) {
            document.getElementById('product-page').innerHTML = '<div class="loading" style="color: #ef4444;">Товар не указан в ссылке.</div>';
            return;
        }

        const apiUrl = `${STRAPI_BASE_URL}/api/models/${productId}?populate=*&_t=${Date.now()}`;

        fetch(apiUrl)
            .then(r => {
                if(!r.ok) throw new Error('Модель не найдена на сервере Postgres');
                return r.json();
            })
            .then(res => {
                const item = res.data;
                if (!item) {
                    document.getElementById('product-page').innerHTML = '<div class="loading" style="color: #ef4444;">Модель не найдена</div>';
                    return;
                }

                const attrs = item.attributes || item;
                const title = attrs.Title || 'Без названия';
                const price = attrs.Price || '0';
                const description = attrs.Description || 'Описание для данной 3D модели еще не заполнено автором.';
                const formats = attrs.Formats ? attrs.Formats.split(',') : ['FBX', 'OBJ', 'ZIP'];
                const polygons = attrs.Polygons !== undefined ? attrs.Polygons : "Не указано";

                // Парсим галерею картинок
                images = [];
                let previewData = attrs.Previews?.data || attrs.Previews;
                if (previewData) {
                    if (!Array.isArray(previewData)) previewData = [previewData];
                    previewData.forEach(img => {
                        const imgAttrs = img.attributes || img;
                        const rawUrl = imgAttrs.url || '';
                        if (rawUrl) {
                            images.push(rawUrl.startsWith('http') ? rawUrl : `${STRAPI_BASE_URL}${rawUrl}`);
                        }
                    });
                }

                if (images.length === 0) {
                    images.push('https://placehold.co/600x400/1a1d29/94a3b8?text=No+Preview');
                }

                // Генерируем индикаторы-полоски снизу
                let indicatorsHtml = '';
                if (images.length > 1) {
                    indicatorsHtml = '<div class="slider-indicators">';
                    images.forEach((_, idx) => {
                        indicatorsHtml += `<div class="indicator-line ${idx === 0 ? 'active' : ''}" id="line-ind-${idx}"></div>`;
                    });
                    indicatorsHtml += '</div>';
                }

                // Сборка двухколоночной структуры без старых отзывов
                document.getElementById('product-page').innerHTML = `
                    <div class="product-container">
                        
                        <div class="main-content">
                            
                            <div class="slider-wrapper">
                                ${images.length > 1 ? `
                                    <div class="hover-zone left" onmouseenter="prevSlide()" onclick="prevSlide()"></div>
                                    <div class="hover-zone right" onmouseenter="nextSlide()" onclick="nextSlide()"></div>
                                ` : ''}
                                
                                <img id="slider-main-img" src="${images[0]}" class="slider-img" alt="${title}">
                                
                                ${indicatorsHtml}
                            </div>
                            
                            <div class="formats-container">
                                ${formats.map(f => `<span class="format-badge">${f.trim()}</span>`).join('')}
                            </div>
                            
                            <div class="description-box">
                                <h3>Описание товара</h3>
                                <p>${description}</p>
                            </div>
                        </div>
                        
                        <div class="sidebar">
                            <div class="action-card">
                                <h1 class="product-title">${title}</h1>
                                <div class="product-spec-row">Полигоны (Polygons): <strong>${polygons}</strong></div>
                                <p class="product-price">${price} $</p>
                                <button class="checkout-btn" onclick="alert('Перенаправление на платежный шлюз...')">Купить сейчас</button>
                            </div>
                            
                            <div class="author-card">
                                <div class="author-info">
                                    <div class="author-avatar">R</div>
                                    <div>
                                        <div class="author-name">Resperator</div>
                                        <span style="color: #94a3b8; font-size: 0.85rem;">3D Моделлер</span>
                                    </div>
                                </div>
                                <p style="font-size: 0.9rem; color: #94a3b8; line-height: 1.4;">Другие работы автора всегда доступны в его профиле.</p>
                            </div>
                        </div>
                        
                    </div>
                `;
            })
            .catch(err => {
                console.error(err);
                document.getElementById('product-page').innerHTML = `<div class="loading" style="color: #ef4444;">Не удалось загрузить карточку товара. Причина: ${err.message}</div>`;
            });
    });

    function updateSliderView() {
        const imgEl = document.getElementById('slider-main-img');
        if (imgEl) imgEl.src = images[currentIndex];
        
        images.forEach((_, idx) => {
            const line = document.getElementById(`line-ind-${idx}`);
            if (line) {
                if (idx === currentIndex) {
                    line.classList.add('active');
                } else {
                    line.classList.remove('active');
                }
            }
        });
    }

    function nextSlide() {
        if (images.length <= 1) return;
        currentIndex = (currentIndex + 1) % images.length;
        updateSliderView();
    }

    function prevSlide() {
        if (images.length <= 1) return;
        currentIndex = (currentIndex - 1 + images.length) % images.length;
        updateSliderView();
    }
</script>
</body>
</html>
