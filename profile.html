<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <style>
        /* ТВОИ ОРИГИНАЛЬНЫЕ СТИЛИ (ОСТАЛИСЬ БЕЗ ИЗМЕНЕНИЙ) */
        body {
            background-color: #121212;
            color: #fff;
            font-family: sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .btn {
            background-color: #242424;
            color: #fff;
            padding: 10px 15px;
            text-decoration: none;
            border: 1px solid #444;
            display: inline-block;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: #1e1e1e;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 400px;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn">— На главную</a>
    <br>
    <button class="btn" id="openModalBtn">+ Добавить модель</button>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModalBtn">&times;</span>
            <h2>Опубликовать новую работу</h2>
            <br>
            <form id="upload-form">
                <div class="form-group">
                    <label for="model-title">Название модели</label>
                    <input type="text" id="model-title" required>
                </div>
                <button type="submit" class="btn">Опубликовать</button>
            </form>
        </div>
    </div>

<script>
    // ТВОЯ ОРИГИНАЛЬНАЯ ЛОГИКА МОДАЛЬНОГО ОКНА
    const modal = document.getElementById("myModal");
    const btn = document.getElementById("openModalBtn");
    const span = document.getElementById("closeModalBtn");

    btn.onclick = function() { modal.style.display = "flex"; }
    span.onclick = function() { modal.style.display = "none"; }
    window.onclick = function(event) {
        if (event.target == modal) { modal.style.display = "none"; }
    }

    // ИСПРАВЛЕННЫЙ JS-КОД ДЛЯ СТРОКИ 196 (УБИРАЕТ FORBIDDEN)
    document.getElementById('upload-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const modelTitle = document.getElementById('model-title').value.trim();
        
        // Извлекаем токен авторизованного юзера Vandasik
        const token = localStorage.getItem('token');

        try {
            const response = await fetch('https://my-strapi-project-production-f85a.up.railway.app/api/models', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // Передаем токен в заголовке, чтобы сервер одобрил запрос
                    'Authorization': `Bearer ${token}`
                },
                // Заворачиваем в data, как требует Strapi v4
                body: JSON.stringify({
                    data: {
                        title: modelTitle
                    }
                })
            });

            const data = await response.json();

            if (response.ok) {
                alert(`Успешно создано бэкенде Strapi`);
                document.getElementById('upload-form').reset();
                modal.style.display = "none";
            } else {
                alert(`Ошибка: ${data.error ? data.error.message : 'Forbidden'}`);
            }

        } catch (error) {
            console.error('Ошибка:', error);
            alert('Ошибка при создании записи в бэкенде Strapi.');
        }
    });
</script>

</body>
</html>
