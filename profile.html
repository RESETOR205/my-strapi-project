<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет | 3D Market</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { background: #0f111a; color: #fff; padding: 20px; }

    /* Шапка (как на главной) */
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #1e293b; }
    .logo-link { color: #fff; text-decoration: none; font-size: 28px; font-weight: bold; }
    .back-btn { padding: 10px 20px; background: #334155; border: none; border-radius: 8px; color: #fff; cursor: pointer; text-decoration: none; font-weight: bold; }
    .back-btn:hover { background: #475569; }

    /* Блок профиля автора (По твоему рисунку) */
    .profile-container { display: flex; align-items: center; gap: 25px; background: #1a1d29; padding: 30px; border-radius: 16px; border: 1px solid #334155; margin-bottom: 40px; }
    .profile-avatar { width: 100px; height: 100px; background: #4f46e5; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 36px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .profile-info { display: flex; flex-direction: column; gap: 8px; }
    .profile-header-row { display: flex; align-items: center; gap: 15px; }
    .profile-nick { font-size: 20px; color: #94a3b8; font-weight: normal; text-transform: lowercase; }
    .profile-rating { display: flex; align-items: center; gap: 5px; color: #f59e0b; font-size: 18px; font-weight: bold; }
    .profile-reviews { color: #64748b; font-size: 14px; }
    .profile-username { font-size: 32px; font-weight: bold; letter-spacing: 1px; }

    /* Заголовок секции и кнопка добавления */
    .section-title-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #1a1d29; border: 1px solid #334155; border-radius: 8px; margin-bottom: 25px; }
    .section-title { font-size: 18px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; color: #cbd5e1; }
    .add-product-btn { padding: 8px 16px; background: #22c55e; border: none; border-radius: 6px; color: #fff; font-weight: bold; cursor: pointer; }
    .add-product-btn:hover { background: #16a34a; }

    /* Сетка работ */
    .works-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
    .product-card { background: #1a1d29; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-decoration: none; color: inherit; display: flex; flex-direction: column; border: 1px solid transparent; transition: transform 0.3s ease, border-color 0.3s ease; }
    .product-card:hover { transform: scale(1.03); border-color: #4f46e5; }
    .product-img { width: 100px%; height: 200px; object-fit: cover; background: #0f111a; }
    .product-info { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
    .product-title { font-size: 18px; margin-bottom: 8px; color: #fff; }
    .product-price { font-size: 20px; font-weight: bold; color: #10b981; margin-top: auto; }

    /* Стили для формы (Всплывает только при создании товара) */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
    .modal-content { background: #1a1d29; padding: 30px; border-radius: 12px; border: 1px solid #334155; width: 100%; max-width: 450px; position: relative; }
    .close-modal { position: absolute; right: 20px; top: 15px; font-size: 28px; color: #94a3b8; cursor: pointer; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 14px; }
    .form-group input { width: 100%; padding: 10px; background: #0f111a; border: 1px solid #334155; border-radius: 6px; color: #fff; }
    .submit-btn { width: 100%; padding: 12px; background: #4f46e5; border: none; border-radius: 6px; color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo-link">3D Market</a>
    <a href="index.html" class="back-btn">← На главную</a>
  </header>

  <div class="profile-container">
    <div class="profile-avatar" id="user-avatar-letter">U</div>
    <div class="profile-info">
      <div class="profile-header-row">
        <div class="profile-nick">ник</div>
        <div class="profile-rating">★ 5.0</div>
        <div class="profile-reviews">кол-во отзывов (12)</div>
      </div>
      <div class="profile-username" id="user-username-display">ЮЗЕРНЕЙМ</div>
    </div>
  </div>

  <div class="section-title-bar">
    <div class="section-title">Лучшие работы</div>
    <button class="add-product-btn" id="open-add-modal">+ Добавить модель</button>
  </div>

  <div class="works-grid" id="author-works-box">
    </div>

  <div id="add-modal" class="modal">
    <div class="modal-content">
      <span class="close-modal" id="close-add-modal">&times;</span>
      <h3 style="margin-bottom: 20px;">Опубликовать новую работу</h3>
      <form id="add-model-form">
        <div class="form-group">
          <label>Название модели</label>
          <input type="text" id="model-title" required placeholder="Например: Меч Артаса">
        </div>
        <div class="form-group">
          <label>Цена ($)</label>
          <input type="number" id="model-price" required placeholder="0">
        </div>
        <div class="form-group">
          <label>Визуализация модели (.glb)</label>
          <input type="file" id="model-file-glb" accept=".glb" required>
        </div>
        <div class="form-group">
          <label>Исходник для покупки (.fbx / .zip)</label>
          <input type="file" id="model-file-fbx" accept=".fbx,.zip,.rar" required>
        </div>
        <div class="form-group">
          <label>Обложка карточки (Картинка)</label>
          <input type="file" id="model-img" accept="image/*" required>
        </div>
        <button type="submit" class="submit-btn">Выставить на продажу</button>
      </form>
    </div>
  </div>

  <script>
    const STRAPI_URL = 'https://my-strapi-project-production-f85a.up.railway.app';

    document.addEventListener("DOMContentLoaded", () => {
      const userStatus = localStorage.getItem('userStatus');
      if (!userStatus) {
        window.location.href = 'auth.html';
        return;
      }

      // Выводим имя текущего юзера
      const username = localStorage.getItem('username') || 'Пользователь';
      document.getElementById('user-username-display').textContent = username.toUpperCase();
      document.getElementById('user-avatar-letter').textContent = username.charAt(0).toUpperCase();

      loadAuthorProducts();
    });

    // Окно добавления товара
    const modal = document.getElementById('add-modal');
    document.getElementById('open-add-modal').addEventListener('click', () => modal.style.display = 'flex');
    document.getElementById('close-add-modal').addEventListener('click', () => modal.style.display = 'none');

    // Загрузка только тех моделей, которые принадлежат текущему пользователю
    async function loadAuthorProducts() {
      const box = document.getElementById('author-works-box');
      try {
        // Запрашиваем модели с фильтрацией по автору (если в Strapi настроена связь, либо пока берем все для теста)
        const res = await fetch(`${STRAPI_URL}/api/models?populate=*`);
        if (!res.ok) throw new Error();
        const data = await res.json();

        if (!data.data || data.data.length === 0) {
          box.innerHTML = '<p style="color: #94a3b8; grid-column: 1/-1; text-align: center;">У вас пока нет опубликованных работ.</p>';
          return;
        }

        box.innerHTML = '';
        data.data.forEach(item => {
          const title = item.Title || 'Без названия';
          const price = item.Price ? `$${item.Price}` : 'Бесплатно';
          let imgUrl = 'https://placeholder.co/600x400/1a1d29/fff?text=3D+Model';
          
          if (item.Previews && item.Previews[0]) {
            imgUrl = STRAPI_URL + item.Previews[0].url;
          } else if (item.Image) {
            imgUrl = STRAPI_URL + item.Image.url;
          }

          box.innerHTML += `
            <div class="product-card">
              <img src="${imgUrl}" class="product-img" alt="${title}">
              <div class="product-info">
                <div class="product-title">${title}</div>
                <div class="product-price">${price}</div>
              </div>
            </div>
          `;
        });
      } catch (err) {
        box.innerHTML = '<p style="color: #ef4444;">Ошибка загрузки ваших работ.</p>';
      }
    }

    // Логика отправки формы в Strapi
    document.getElementById('add-model-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (localStorage.getItem('isGuest') === 'true') {
        alert('Гости не могут добавлять модели!');
        return;
      }

      const token = localStorage.getItem('token');
      const title = document.getElementById('model-title').value;
      const price = document.getElementById('model-price').value;
      const glbFile = document.getElementById('model-file-glb').files[0];
      const fbxFile = document.getElementById('model-file-fbx').files[0];
      const imgFile = document.getElementById('model-img').files[0];

      const formData = new FormData();
      formData.append('data', JSON.stringify({ Title: title, Price: Number(price) }));
      formData.append('files.ModelGLB', glbFile);
      formData.append('files.ModelFBX', fbxFile);
      formData.append('files.Image', imgFile);

      try {
        const response = await fetch(`${STRAPI_URL}/api/models`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });

        if (response.ok) {
          alert('Новая работа успешно опубликована в вашем профиле!');
          modal.style.display = 'none';
          loadAuthorProducts();
        } else {
          alert('Ошибка при создании записи в бэкенде Strapi.');
        }
      } catch (error) {
        console.error(error);
        alert('Ошибка соединения с сервером.');
      }
    });
  </script>
</body>
</html>
