<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn-main {
            background-color: #1e293b;
            color: #94a3b8;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #334155;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .btn-main:hover {
            color: #f8fafc;
            border-color: #38bdf8;
        }

        .btn-add {
            background-color: #22c55e;
            color: #0f172a;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s;
        }

        .btn-add:hover {
            background-color: #16a34a;
        }

        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 18px;
        }

        .close-modal:hover {
            color: #f8fafc;
        }

        h3 {
            margin-bottom: 20px;
            color: #38bdf8;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: #f8fafc;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #38bdf8;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-main">← На главную</a>

    <button class="btn-add" id="open-modal-btn">+ Добавить модель</button>

    <div class="modal-overlay" id="upload-modal">
        <div class="modal-content">
            <span class="close-modal" id="close-modal-btn">×</span>
            <h3>Опубликовать новую работу</h3>
            
            <form id="upload-form">
                <div class="form-group">
                    <label for="model-title">Название модели</label>
                    <input type="text" id="model-title" placeholder="Например: glock" required>
                </div>

                <button type="submit" class="btn-submit">Опубликовать</button>
            </form>
        </div>
    </div>

<script>
    const modal = document.getElementById('upload-modal');
    const openBtn = document.getElementById('open-modal-btn');
    const closeBtn = document.getElementById('close-modal-btn');
    const uploadForm = document.getElementById('upload-form');

    // Логика открытия/закрытия твоего модального окна
    openBtn.addEventListener('click', () => modal.style.display = 'flex');
    closeBtn.addEventListener('click', () => modal.style.display = 'none');
    
    // Закрытие при клике на темную область вокруг окна
    modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.style.display = 'none';
    });

    // ТВОЙ ИСПРАВЛЕННЫЙ СТРОКА 196 JS-КОД ОТПРАВКИ НА СЕРВЕР RAILWAY
    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const modelTitle = document.getElementById('model-title').value.trim();
        
        // 1. Извлекаем секретный JWT-токен авторизованного пользователя из памяти браузера
        const token = localStorage.getItem('token');

        try {
            // 2. Отправляем POST-запрос на Railway сервер Strapi
            const response = await fetch('https://my-strapi-project-production-f85a.up.railway.app/api/models', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // Важнейшая строка: крепим токен, чтобы убрать ошибку 403 Forbidden
                    'Authorization': `Bearer ${token}`
                },
                // Заворачиваем данные в объект data согласно структуре Strapi v4
                body: JSON.stringify({
                    data: {
                        title: modelTitle
                    }
                })
            });

            const data = await response.json();

            if (response.ok) {
                alert(`Успешно! Работа "${modelTitle}" создана в бэкенде Strapi.`);
                uploadForm.reset();
                modal.style.display = 'none'; // Закрываем окно после успеха
            } else {
                // Если Strapi всё равно ругается, выводим точный текст ошибки
                alert(`Ошибка: ${data.error ? data.error.message : 'Не удалось создать запись'}`);
            }

        } catch (error) {
            console.error('Ошибка запроса:', error);
            alert('Критическая ошибка: не удалось связаться с сервером Strapi.');
        }
    });
</script>

</body>
</html>
