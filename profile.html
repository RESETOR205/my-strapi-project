<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | 3D Market</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0f111a; color: #fff; padding: 20px; }

        /* Шапка */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo-link { color: #fff; text-decoration: none; font-size: 28px; font-weight: bold; }
        .back-btn { padding: 10px 20px; background: #334155; border: none; border-radius: 8px; color: #fff; text-decoration: none; }
        .back-btn:hover { background: #475569; }

        /* Блок профиля автора */
        .profile-container { display: flex; align-items: center; gap: 25px; background: #1a1d29; padding: 30px; border-radius: 16px; margin-bottom: 40px; }
        .profile-avatar { width: 100px; height: 100px; background: #4f46e5; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; text-transform: uppercase; }
        .profile-info { display: flex; flex-direction: column; gap: 8px; }
        .profile-header-row { display: flex; align-items: center; gap: 15px; }
        .profile-nick { font-size: 20px; color: #94a3b8; font-weight: normal; text-transform: lowercase; }
        .profile-rating { display: flex; align-items: center; gap: 5px; color: #f59e0b; font-size: 18px; font-weight: bold; }
        .profile-reviews { color: #64748b; font-size: 14px; }
        .profile-username { font-size: 32px; font-weight: bold; letter-spacing: 1px; }

        /* Заголовок секции */
        .section-title-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #334155; margin-bottom: 30px; }
        .section-title { font-size: 18px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; color: #94a3b8; }
        .add-product-btn { padding: 8px 16px; background: #22c55e; border: none; border-radius: 6px; color: #fff; font-weight: bold; cursor: pointer; text-decoration: none; }
        .add-product-btn:hover { background: #16a34a; }

        /* Сетка работ */
        .works-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .product-card { background: #1a1d29; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; padding: 15px; border: 1px solid transparent; transition: transform 0.3s ease, border-color 0.3s ease; }
        .product-card:hover { transform: scale(1.03); border-color: #4f46e5; }
        .product-img { width: 100%; height: 200px; object-fit: cover; background: #0f111a; border-radius: 12px; margin-bottom: 15px; }
        .product-info { padding: 5px; display: flex; flex-direction: column; flex-grow: 1; }
        .product-title { font-size: 18px; margin-bottom: 8px; color: #fff; }
        .product-price { font-size: 20px; font-weight: bold; color: #10b981; margin-top: auto; }

        /* Стили для формы */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15,17,26,0.8); backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        .modal-content { background: #1a1d29; padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); position: relative; max-height: 90vh; overflow-y: auto; }
        .close-modal { position: absolute; right: 20px; top: 20px; font-size: 28px; color: #94a3b8; cursor: pointer; }
        .close-modal:hover { color: #fff; }
        .modal h2 { margin-bottom: 20px; font-size: 22px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 14px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; background: #0f111a; border: 1px solid #334155; border-radius: 6px; color: #fff; font-size: 14px; outline: none; }
        .form-group input[type="file"] { padding: 5px; background: transparent; border: none; }
        .form-group input:focus, .form-group textarea:focus { border-color: #4f46e5; }
        .submit-btn { width: 100%; padding: 12px; background: #4f46e5; border: none; border-radius: 6px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .submit-btn:hover { background: #4338ca; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-link">3D Market</a>
        <a href="index.html" class="back-btn">— На главную</a>
    </header>

    <div class="profile-container">
        <div class="profile-avatar" id="user-avatar">?</div>
        <div class="profile-info">
            <div class="profile-header-row">
                <div class="profile-username" id="user-name">Загрузка...</div>
                <div class="profile-nick" id="user-nick">@username</div>
            </div>
            <div class="profile-header-row">
                <div class="profile-rating">★ 5.0</div>
                <div class="profile-reviews">(0 отзывов)</div>
            </div>
        </div>
    </div>

    <div class="section-title-bar">
        <div class="section-title">Лучшие работы</div>
        <button class="add-product-btn" id="openModalBtn">+ Добавить модель</button>
    </div>

    <div class="works-grid" id="user-models-grid"></div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModalBtn">&times;</span>
            <h2>Опубликовать новую работу</h2>
            <form id="upload-form">
                <div class="form-group">
                    <label for="model-title">Название модели</label>
                    <input type="text" id="model-title" required placeholder="Например: Glock 17">
                </div>
                <div class="form-group">
                    <label for="model-file">Файл модели (.fbx, .obj, .zip)</label>
                    <input type="file" id="model-file" accept=".fbx,.obj,.zip" required>
                </div>
                <div class="form-group">
                    <label for="model-price">Цена (в $ или Free)</label>
                    <input type="text" id="model-price" required placeholder="Например: 15 или Free">
                </div>
                <div class="form-group">
                    <label for="model-img">Фото / Превью модели (изображение)</label>
                    <input type="file" id="model-img" accept="image/*" required>
                </div>
                <div class="form-group">
                    <label for="model-desc">Описание модели</label>
                    <textarea id="model-desc" rows="3" placeholder="Опишите вашу 3D-модель..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Опубликовать</button>
            </form>
        </div>
    </div>

<script>
    // Подстановка данных аккаунта
    document.addEventListener("DOMContentLoaded", () => {
        const storedUsername = localStorage.getItem('username') || "Пользователь";
        document.getElementById('user-name').textContent = storedUsername;
        document.getElementById('user-nick').textContent = '@' + storedUsername.toLowerCase().replace(/\s+/g, '');
        document.getElementById('user-avatar').textContent = storedUsername.charAt(0);
    });

    // Модалка
    const modal = document.getElementById("myModal");
    const btn = document.getElementById("openModalBtn");
    const span = document.getElementById("closeModalBtn");

    if (btn && modal && span) {
        btn.onclick = function() { modal.style.display = "flex"; }
        span.onclick = function() { modal.style.display = "none"; }
        window.onclick = function(event) {
            if (event.target == modal) { modal.style.display = "none"; }
        }
    }

    // ОТПРАВКА ДАННЫХ И ФАЙЛОВ ЧЕРЕЗ FORMDATA
    document.getElementById('upload-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const token = localStorage.getItem('token');
        const formData = new FormData();

        // 1. Создаем объект с текстовыми полями
        const textData = {
            title: document.getElementById('model-title').value.trim(),
            price: document.getElementById('model-price').value.trim(),
            description: document.getElementById('model-desc').value.trim()
        };

        // Запихиваем текстовые данные в формате, который ждет Strapi
        formData.append('data', JSON.stringify(textData));

        // 2. Подцепляем реальные файлы из инпутов (если они выбраны)
        const fileInput = document.getElementById('model-file').files[0];
        const imgInput = document.getElementById('model-img').files[0];

        // Имена 'files.fileField' должны строго совпадать с названиями медиа-полей в твоем Strapi
        if (fileInput) {
            formData.append('files.fileUrl', fileInput); 
        }
        if (imgInput) {
            formData.append('files.imageUrl', imgInput);
        }

        try {
            const response = await fetch('https://my-strapi-project-production-f85a.up.railway.app/api/models', {
                method: 'POST',
                headers: {
                    // Важно: заголовок Content-Type прописывать НЕ НАДО, браузер сделает это сам для FormData!
                    'Authorization': `Bearer ${token}`
                },
                body: formData
            });

            if (response.ok) {
                alert("Успешно опубликовано вместе с файлами!");
                document.getElementById('upload-form').reset();
                if (modal) modal.style.display = "none";
            } else {
                const errorData = await response.json();
                alert(`Ошибка сервера Strapi: ${errorData.error ? errorData.error.message : 'Forbidden'}`);
            }

        } catch (error) {
            console.error('Ошибка запроса:', error);
            alert('Не удалось отправить файлы на бэкенд.');
        }
    });
</script>

</body>
</html>
