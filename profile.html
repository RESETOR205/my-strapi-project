<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | 3D Маркетплейс</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            padding: 40px;
        }

        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        h2, h3 {
            color: #38bdf8;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: #f8fafc;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #38bdf8;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0ea5e9;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #94a3b8;
            text-decoration: none;
        }

        .back-link:hover {
            color: #38bdf8;
        }

        /* Красивая встроенная плашка для уведомлений */
        #status-message {
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

<a href="index.html" class="back-link">← На главную</a>

<div class="profile-container">
    <h2>Личный кабинет</h2>
    <p style="margin-bottom: 30px; color: #94a3b8;">Вы вошли как: <strong id="user-display-name" style="color: #38bdf8;">Гость</strong></p>

    <h3>Опубликовать новую работу</h3>
    
    <form id="upload-form">
        <div class="form-group">
            <label for="model-title">Название модели</label>
            <input type="text" id="model-title" placeholder="Например: glock" required>
        </div>

        <button type="submit" id="submit-btn">Добавить модель</button>
    </form>

    <div id="status-message"></div>
</div>

<script>
    // Проверяем авторизацию при входе в личный кабинет
    document.addEventListener('DOMContentLoaded', () => {
        const userStatus = localStorage.getItem('userStatus');
        const username = localStorage.getItem('username');

        if (userStatus !== 'user' || !username) {
            alert('Доступ запрещен! Пожалуйста, войдите в свой аккаунт.');
            window.location.href = 'auth.html';
            return;
        }

        // Выводим имя пользователя в интерфейс
        document.getElementById('user-display-name').innerText = username;
    });

    // Обработка отправки формы
    document.getElementById('upload-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const modelTitle = document.getElementById('model-title').value.trim();
        const statusMessage = document.getElementById('status-message');
        
        // Достаем токен авторизации из памяти браузера
        const token = localStorage.getItem('token');

        statusMessage.style.display = 'none';

        try {
            // Отправляем POST запрос на твой сервер Railway
            const response = await fetch('https://my-strapi-project-production-f85a.up.railway.app/api/models', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // Передаем токен, чтобы убрать ошибку 403 Forbidden
                    'Authorization': `Bearer ${token}`
                },
                // Заворачиваем данные в объект data (требование Strapi v4)
                body: JSON.stringify({
                    data: {
                        title: modelTitle
                    }
                })
            });

            const data = await response.json();

            if (response.ok) {
                statusMessage.style.backgroundColor = 'rgba(34, 197, 94, 0.1)';
                statusMessage.style.color = '#22c55e';
                statusMessage.style.border = '1px solid rgba(34, 197, 94, 0.2)';
                statusMessage.innerText = `✅ Модель "${modelTitle}" успешно опубликована в Strapi!`;
                statusMessage.style.display = 'block';
                
                document.getElementById('upload-form').reset(); // Очищаем форму
            } else {
                statusMessage.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
                statusMessage.style.color = '#ef4444';
                statusMessage.style.border = '1px solid rgba(239, 68, 68, 0.2)';
                statusMessage.innerText = `❌ Ошибка: ${data.error ? data.error.message : 'Сервер отклонил запрос'}`;
                statusMessage.style.display = 'block';
            }

        } catch (error) {
            console.error('Ошибка при отправке:', error);
            statusMessage.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
            statusMessage.style.color = '#ef4444';
            statusMessage.innerText = '🤖 Не удалось связаться с бэкендом. Проверь сеть!';
            statusMessage.style.display = 'block';
        }
    });
</script>

</body>
</html>
