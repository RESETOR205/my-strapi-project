<script>
        // Твой API адрес здесь
        const apiUrl = 'https://my-strapi-project-production-f85a.up.railway.app/api/models?populate=*';

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                const shopDiv = document.getElementById('shop');
                shopDiv.innerHTML = '';
                
                if (data && data.data) {
                    data.data.forEach(item => {
                        const attrs = item.attributes || item;
                        
                        const title = attrs.Title || 'Без названия';
                        const price = attrs.Price || '0';
                        
                        // Логика поиска картинки в системе Strapi v4/v5
                        let imgUrl = 'https://placehold.co/200x150?text=No+Image'; // Картинка-заглушка
                        
                        if (attrs.Previews && attrs.Previews.data) {
                            // Если это одиночное или первое медиа в массиве
                            const mediaData = Array.isArray(attrs.Previews.data) ? attrs.Previews.data[0] : attrs.Previews.data;
                            if (mediaData && mediaData.attributes && mediaData.attributes.url) {
                                imgUrl = mediaData.attributes.url;
                            } else if (mediaData && mediaData.url) {
                                imgUrl = mediaData.url;
                            }
                        }

                        // Если Strapi дал относительный путь (например, /uploads/...), склеиваем его с адресом сервера
                        if (imgUrl.startsWith('/uploads/')) {
                            imgUrl = 'https://my-strapi-project-production-f85a.up.railway.app' + imgUrl;
                        }
                        
                        shopDiv.innerHTML += `
                            <div class="card">
                                <img src="${imgUrl}" alt="${title}" style="width: 100%; height: auto; border-radius: 4px; margin-bottom: 10px;">
                                <h3>${title}</h3>
                                <p>Price: ${price}$</p>
                            </div>
                        `;
                    });
                } else {
                    shopDiv.innerHTML = 'Товары не найдены или база пуста';
                }
            })
            .catch(error => {
                console.error('Ошибка:', error);
                document.getElementById('shop').innerHTML = 'Ошибка загрузки данных';
            });
    </script>
