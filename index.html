<!DOCTYPE html>
<html>
<head>
    <title>Мой Магазин</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; width: 200px; }
    </style>
</head>
<body>
    <div id="shop">Загрузка товаров...</div>
    <script>
        // Твой API адрес здесь
        const apiUrl = 'https://my-strapi-project-production-f85a.up.railway.app/api/models';

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                const shopDiv = document.getElementById('shop');
                shopDiv.innerHTML = '';
                
                // Проверяем, что данные пришли в правильном формате
                if (data && data.data) {
                    data.data.forEach(item => {
                        // Strapi прячет поля внутрь attributes
                        const title = item.attributes ? item.attributes.Title : (item.Title || 'Без названия');
                        const price = item.attributes ? item.attributes.Price : (item.Price || '0');
                        
                        shopDiv.innerHTML += `
                            <div class="card">
                                <h3>${title}</h3>
                                <p>Цена: ${price}$</p>
                            </div>
                        `;
                    });
                } else {
                    shopDiv.innerHTML = 'Товары не найдены или база пуста';
                }
            })
            .catch(error => {
                console.error('Ошибка:', error);
                document.getElementById('shop').innerHTML = 'Ошибка загрузки данных';
            });
    </script>
</body>
</html>
