<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Market | Витрина</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #111;
            font-weight: 700;
            margin-bottom: 30px;
        }

        /* Сетка товаров как на CGTrader */
        #shop {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Стильная карточка товара */
        .card {
            background: #ffffff;
            border: 1px solid #eef0f2;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.06);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #f0f2f5;
            margin-bottom: 12px;
        }

        .card-info {
            text-align: left;
            margin-bottom: 15px;
        }

        .card h3 {
            font-size: 1.05rem;
            margin: 0 0 6px 0;
            color: #1a1a1a;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card .price {
            font-size: 1.15rem;
            color: #2b6cb0;
            font-weight: 700;
            margin: 0;
        }

        .buy-btn {
            background: #2b6cb0;
            color: white;
            border: none;
            padding: 11px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            width: 100%;
            transition: background 0.15s ease;
        }

        .buy-btn:hover {
            background: #1a4975;
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: #666;
            grid-column: 1 / -1;
            padding: 50px 0;
        }
    </style>
</head>
<body>

    <h1>Витрина 3D Моделей</h1>
    <div id="shop"><div class="loading">Загрузка моделей...</div></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const apiUrl = 'https://my-strapi-project-production-f85a.up.railway.app/api/models?populate=*';

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Ошибка сети (403/400)');
                    return response.json();
                })
                .then(data => {
                    const shopDiv = document.getElementById('shop');
                    shopDiv.innerHTML = '';
                    
                    if (data && data.data && data.data.length > 0) {
                        data.data.forEach(item => {
                            const title = item.Title || 'Без названия';
                            const price = item.Price || '0';
                            const productId = item.documentId || item.id;
                            
                            let imgUrl = 'https://placehold.co/240x180?text=No+Preview';
                            
                            if (item.Previews && item.Previews.length > 0) {
                                imgUrl = item.Previews[0].url || imgUrl;
                            } else if (item.Previews && item.Previews.url) {
                                imgUrl = item.Previews.url;
                            }
                            
                            if (imgUrl.startsWith('/uploads/')) {
                                imgUrl = 'https://my-strapi-project-production-f85a.up.railway.app' + imgUrl;
                            }
                            
                            // При клике на карточку открывается product.html?id=ID_ТОВАРА
                            shopDiv.innerHTML += `
                                <div class="card" onclick="location.href='product.html?id=${productId}'">
                                    <img src="${imgUrl}" alt="${title}">
                                    <div class="card-info">
                                        <h3>${title}</h3>
                                        <p class="price">${price}$</p>
                                    </div>
                                    <button class="buy-btn" onclick="event.stopPropagation(); addToCart('${productId}')">В корзину</button>
                                </div>
                            `;
                        });
                    } else {
                        shopDiv.innerHTML = '<div class="loading">Товары не найдены</div>';
                    }
                })
                .catch(error => {
                    console.error('Ошибка:', error);
                    document.getElementById('shop').innerHTML = '<div class="loading" style="color: #c53030;">Ошибка загрузки бэкенда. Проверьте права Public в Strapi.</div>';
                });
        });

        function addToCart(id) {
            alert('Товар добавлен в корзину! ID: ' + id);
        }
    </script>
</body>
</html>
