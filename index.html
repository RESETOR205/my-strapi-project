<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Витрина | 3D Маркетплейс</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
        }

        /* Шапка сайта */
        header {
            background-color: #1e293b;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #38bdf8;
            text-decoration: none;
        }

        /* Зона авторизации (Здесь магия замены) */
        .auth-zone {
            display: flex;
            align-items: center;
        }

        .login-btn {
            color: #0f172a;
            background-color: #38bdf8;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .login-btn:hover {
            background-color: #0ea5e9;
        }

        /* Стили для вошедшего пользователя */
        .user-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .welcome-text {
            color: #38bdf8;
            font-weight: 600;
        }

        .profile-btn {
            color: #f8fafc;
            background-color: #334155;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .profile-btn:hover {
            background-color: #475569;
        }

        .logout-btn {
            color: #94a3b8;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
        }

        .logout-btn:hover {
            color: #f1f5f9;
        }

        /* Контент витрины */
        main {
            padding: 40px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        .catalog-placeholder {
            margin-top: 40px;
            padding: 60px;
            border: 2px dashed #334155;
            border-radius: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">📦 3D Маркетплейс</a>
        
        <div class="auth-zone" id="auth-header-zone">
            <a href="auth.html" class="login-btn">Войти</a>
        </div>
    </header>

    <main>
        <h1>Витрина 3D Моделей</h1>
        <p>Добро пожаловать на наш маркетплейс предметов.</p>
        
        <div class="catalog-placeholder">
            Твой каталог 3D моделей (здесь будут выводиться карточки товаров из Strapi)
        </div>
    </main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Читаем данные авторизации из памяти браузера
        const userStatus = localStorage.getItem('userStatus');
        const username = localStorage.getItem('username');
        const authZone = document.getElementById('auth-header-zone');

        // Проверяем: если статус равен 'user' и имя записано
        if (userStatus === 'user' && username) {
            // Перерисовываем шапку под авторизованного пользователя
            authZone.innerHTML = `
                <div class="user-container">
                    <span class="welcome-text">👋 Привет, ${username}!</span>
                    <a href="profile.html" class="profile-btn">В профиль</a>
                    <span class="logout-btn" onclick="logoutUser()">Выйти</span>
                </div>
            `;
        } 
        // Если зашел гость или никто не авторизован — оставляем кнопку "Войти" по умолчанию
    });

    // Функция для выхода из профиля
    function logoutUser() {
        localStorage.clear(); // Полностью очищаем хранилище (сессию)
        window.location.reload(); // Перезагружаем страницу, чтобы вернулась кнопка "Войти"
    }
</script>

</body>
</html>
