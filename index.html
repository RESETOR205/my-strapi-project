<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Витрина | 3D Маркетплейс</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0f111a; color: #fff; padding: 20px; min-height: 100vh; }
        
        /* Шапка сайта */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid #334155; padding-bottom: 20px; }
        .logo { font-size: 24px; font-weight: bold; color: #38bdf8; text-decoration: none; }
        
        /* Зона авторизации */
        .auth-zone { display: flex; align-items: center; }
        .login-btn { color: #0f172a; background-color: #38bdf8; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: background-color 0.2s; }
        .login-btn:hover { background-color: #0ea5e9; }
        
        /* Стили для вошедшего пользователя */
        .user-container { display: flex; align-items: center; gap: 15px; }
        .welcome-text { color: #38bdf8; font-weight: bold; }
        .profile-btn { padding: 10px 20px; background: #4f46e5; border: none; border-radius: 8px; color: #fff; text-decoration: none; font-weight: bold; transition: background 0.2s; }
        .profile-btn:hover { background: #4338ca; }
        .logout-btn { color: #94a3b8; font-size: 14px; cursor: pointer; text-decoration: underline; }
        .logout-btn:hover { color: #fff; }
        
        /* Контент витрины */
        .hero-section { text-align: center; padding: 60px 20px; background: linear-gradient(135deg, #1a1d29 0%, #0f111a 100%); border-radius: 16px; margin-bottom: 40px; border: 1px solid #1e293b; }
        .hero-section h1 { font-size: 42px; margin-bottom: 15px; letter-spacing: 1px; }
        .hero-section p { color: #94a3b8; font-size: 18px; }

        .section-title-bar { padding: 10px 0; border-bottom: 1px solid #334155; margin-bottom: 30px; }
        .section-title { font-size: 18px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; color: #94a3b8; }
        
        /* Сетка карточек */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .product-card { background: #1a1d29; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; padding: 15px; border: 1px solid transparent; text-decoration: none; color: inherit; transition: transform 0.3s ease, border-color 0.3s ease; }
        .product-card:hover { transform: translateY(-4px); border-color: #4f46e5; }
        
        /* Контейнер изображений */
        .product-img-wrapper { 
            position: relative; 
            width: 100%; 
            height: 200px; 
            background: #0f111a; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            overflow: hidden; 
        }
        
        .product-img { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease; 
            pointer-events: none;
        }

        .product-img.active {
            opacity: 1;
        }

        .product-card:hover .product-img.active { 
            transform: scale(1.04); 
        }

        /* Индикаторы (точки) */
        .dots-container {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
            padding: 4px 8px;
            background: rgba(15, 17, 26, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 12px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .dot:hover, .dot.active {
            background: #38bdf8;
            transform: scale(1.3);
        }

        .product-info { padding: 5px; display: flex; flex-direction: column; flex-grow: 1; }
        .product-title { font-size: 18px; margin-bottom: 8px; color: #fff; }
        .product-price { font-size: 20px; font-weight: bold; color: #10b981; margin-top: auto; }
        
        .loader { color: #94a3b8; padding: 40px; text-align: center; font-size: 16px; width: 100%; grid-column: 1 / -1; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">📦 3D Маркетплейс</a>
        
        <div class="auth-zone" id="auth-header-zone">
            <a href="auth.html" class="login-btn">Войти</a>
        </div>
    </header>

    <main>
        <div class="hero-section">
            <h1>Витрина 3D Моделей</h1>
            <p>Добро пожаловать на наш маркетплейс предметов.</p>
        </div>
        
        <div class="section-title-bar">
            <div class="section-title">Все доступные модели</div>
        </div>

        <div class="market-grid" id="global-models-grid">
            <div class="loader">Загрузка витрины моделей...</div>
        </div>
    </main>

<script>
    const STRAPI_BASE_URL = 'https://my-strapi-project-production-f85a.up.railway.app';

    function logoutUser() {
        localStorage.clear(); 
        window.location.reload(); 
    }

    function getImageUrl(item) {
        if (!item) return '';
        const previewAttrs = item.attributes || item;
        const rawUrl = previewAttrs.url || '';
        if (!rawUrl) return '';
        return rawUrl.startsWith('http') ? rawUrl : `${STRAPI_BASE_URL}${rawUrl}`;
    }

    async function loadMarketModels() {
        const grid = document.getElementById('global-models-grid');
        if (!grid) return;

        try {
            const res = await fetch(`${STRAPI_BASE_URL}/api/models?populate=*&_t=${Date.now()}`, {
                method: 'GET'
            });

            if (!res.ok) throw new Error("Не удалось загрузить модели с сервера");

            const responseData = await res.json();
            const models = responseData.data || [];

            if (models.length === 0) {
                grid.innerHTML = '<div class="loader">На витрине пока нет ни одной модели. Будьте первым, кто загрузит!</div>';
                return;
            }

            grid.innerHTML = ''; 

            models.forEach(item => {
                const modelId = item.id;
                const attrs = item.attributes || item;
                const title = attrs.Title || "Без названия";
                const price = attrs.Price !== undefined ? attrs.Price : 0;

                // Извлекаем ВСЕ превью
                let previewData = attrs.Previews?.data || attrs.Previews || [];
                if (!Array.isArray(previewData)) {
                    previewData = previewData ? [previewData] : [];
                }

                // Массив прямых ссылок на изображения
                const imageUrls = previewData
                    .map(imgItem => getImageUrl(imgItem))
                    .filter(url => url !== '');

                // Генерируем карточку
                const card = document.createElement('a');
                card.href = `product.html?id=${modelId}`;
                card.className = 'product-card';

                // Формируем HTML для картинок и индикаторов (точек)
                let imagesHtml = '';
                let dotsHtml = '';

                if (imageUrls.length > 0) {
                    imagesHtml = imageUrls.map((url, idx) => 
                        `<img src="${url}" class="product-img ${idx === 0 ? 'active' : ''}" data-index="${idx}" alt="${title}">`
                    ).join('');

                    if (imageUrls.length > 1) {
                        dotsHtml = `<div class="dots-container">` + 
                            imageUrls.map((_, idx) => 
                                `<span class="dot ${idx === 0 ? 'active' : ''}" data-index="${idx}"></span>`
                            ).join('') + 
                            `</div>`;
                    }
                } else {
                    imagesHtml = `<div class="product-img" style="background: #0f111a;"></div>`;
                }

                card.innerHTML = `
                    <div class="product-img-wrapper">
                        ${imagesHtml}
                        ${dotsHtml}
                    </div>
                    <div class="product-info">
                        <div class="product-title">${title}</div>
                        <div class="product-price">${price} $</div>
                    </div>
                `;

                // --- ЛОГИКА ПЕРЕКЛЮЧЕНИЯ КАРТИНОК И ВОЗВРАТА К ПЕРВОЙ ---
                if (imageUrls.length > 1) {
                    const imgs = card.querySelectorAll('.product-img');
                    const dots = card.querySelectorAll('.dot');

                    const setActiveImage = (index) => {
                        imgs.forEach(img => img.classList.toggle('active', img.dataset.index == index));
                        dots.forEach(dot => dot.classList.toggle('active', dot.dataset.index == index));
                    };

                    // При наведении на конкретную точку показываем её фото
                    dots.forEach(dot => {
                        dot.addEventListener('mouseenter', (e) => {
                            e.preventDefault();
                            setActiveImage(dot.dataset.index);
                        });
                    });

                    // При первом наведении на саму карточку включаем 2-е фото
                    card.addEventListener('mouseenter', () => {
                        setActiveImage(1);
                    });

                    // При сходе курсора с карточки ОБЯЗАТЕЛЬНО возвращаем 1-е фото
                    card.addEventListener('mouseleave', () => {
                        setActiveImage(0);
                    });
                }

                grid.appendChild(card);
            });

        } catch (error) {
            console.error("Ошибка загрузки витрины:", error);
            grid.innerHTML = `<div class="loader" style="color: #ef4444;">Ошибка подключения к серверу: ${error.message}</div>`;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const userStatus = localStorage.getItem('userStatus');
        const username = localStorage.getItem('username');
        const authZone = document.getElementById('auth-header-zone');

        if (userStatus === 'user' && username) {
            authZone.innerHTML = `
                <div class="user-container">
                    <span class="welcome-text">👋 Привет, ${username}!</span>
                    <a href="user.html" class="profile-btn">В профиль</a>
                    <span class="logout-btn" onclick="logoutUser()">Выйти</span>
                </div>
            `;
        } 

        loadMarketModels();
    });
</script>

</body>
</html>
