<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Авторизация | 3D Market</title>
  <style>
    /* Базовые стили для темной темы */
    body {
      background: #0f111a;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* Контейнер формы */
    .auth-container {
      background: #1a1d29;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 360px;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #94a3b8;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px;
      background: #0f111a;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #fff;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #4f46e5;
    }

    /* Основная кнопка Войти */
    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      transition: background 0.2s;
    }

    .submit-btn:hover {
      background: #4338ca;
    }

    /* НАША НОВАЯ КНОПКА SKIP */
    .skip-button {
      background: none;
      border: none;
      color: #888888; /* Неяркий серый цвет */
      cursor: pointer;
      font-size: 14px;
      margin-top: 15px;
      text-decoration: underline; /* Подчеркивание как у ссылки */
      transition: color 0.2s;
      display: block;
      width: 100%;
      text-align: center;
    }

    .skip-button:hover {
      color: #ffffff; /* Белеет при наведении */
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <h2>Вход в систему</h2>
    
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required placeholder="example@mail.com">
      </div>
      
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>

      <button type="submit" class="submit-btn">Войти</button>

      <button type="button" id="skip-btn" class="skip-button">Пропустить регистрацию →</button>
    </form>
  </div>

  <script>
    // 1. Логика для кнопки "Пропустить" (Вход как гость)
    document.getElementById('skip-btn').addEventListener('click', () => {
      // Стираем старые токены, чтобы не было путаницы
      localStorage.removeItem('token');
      localStorage.removeItem('user');

      // Ставим метку гостя
      localStorage.setItem('isGuest', 'true');

      // Перенаправляем на страницу с 3D-моделями
      window.location.href = 'product.html'; 
    });

    // 2. Стандартная отправка формы (для зарегистрированных пользователей)
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        // Меняем адрес на твой сервер Railway, когда деплой завершится
        const response = await fetch('http://localhost:1337/api/auth/local', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier: email, password: password })
        });

        const data = await response.json();

        if (data.jwt) {
          localStorage.setItem('token', data.jwt);
          localStorage.setItem('user', JSON.stringify(data.user));
          localStorage.removeItem('isGuest'); // Убираем флаг гостя, так как вошел юзер
          alert(' Успешный вход!');
          window.location.href = 'product.html';
        } else {
          alert('Ошибка: ' + (data.error?.message || 'Неверный логин или пароль'));
        }
      } catch (err) {
        console.error(err);
        alert('Не удалось связаться с сервером бэкенда.');
      }
    });
  </script>

</body>
</html>
