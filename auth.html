<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация | 3D Маркетплейс</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #38bdf8;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: #f8fafc;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #38bdf8;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0ea5e9;
        }

        .toggle-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #94a3b8;
        }

        .toggle-text span {
            color: #38bdf8;
            cursor: pointer;
            text-decoration: underline;
        }

        .guest-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
        }

        .guest-link:hover {
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <h2 id="form-title">Регистрация</h2>
    
    <form id="auth-form">
        <div class="form-group" id="username-group">
            <label for="username">Имя пользователя</label>
            <input type="text" id="username" placeholder="Придумайте никнейм" required>
        </div>

        <div class="form-group">
            <label for="email">Электронная почта</label>
            <input type="email" id="email" placeholder="example@mail.com" required>
        </div>

        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" placeholder="Минимум 6 символов" required>
        </div>

        <button type="submit" id="submit-btn">Создать аккаунт</button>
    </form>

    <div id="error-message" style="color: #ef4444; background-color: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 6px; font-size: 14px; text-align: center; margin-top: 15px; display: none; border: 1px solid rgba(239, 68, 68, 0.2);"></div>

    <div class="toggle-text" id="toggle-zone">
        Уже есть аккаунт? <span id="switch-mode">Войти</span>
    </div>

    <a href="#" class="guest-link" onclick="saveGuestAndGo()">Пропустить регистрацию →</a>
</div>

<script>
    let isSignUpMode = true; 
    
    const formTitle = document.getElementById('form-title');
    const usernameGroup = document.getElementById('username-group');
    const usernameInput = document.getElementById('username');
    const submitBtn = document.getElementById('submit-btn');
    const toggleZone = document.getElementById('toggle-zone');

    // Твой боевой адрес сервера на Railway
    const STRAPI_URL = 'https://my-strapi-project-production-f85a.up.railway.app'; 

    // Функция переключения режимов Вход / Регистрация
    function initSwitchBehavior() {
        const switchModeBtn = document.getElementById('switch-mode');
        if (!switchModeBtn) return;

        switchModeBtn.addEventListener('click', () => {
            isSignUpMode = !isSignUpMode;
            // Сбрасываем текст ошибки при переключении
            document.getElementById('error-message').style.display = 'none';
            
            if (isSignUpMode) {
                formTitle.innerText = 'Регистрация';
                submitBtn.innerText = 'Создать аккаунт';
                usernameGroup.style.display = 'block';
                usernameInput.setAttribute('required', 'true');
                toggleZone.innerHTML = 'Уже есть аккаунт? <span id="switch-mode" style="color: #38bdf8; cursor: pointer; text-decoration: underline;">Войти</span>';
            } else {
                formTitle.innerText = 'Вход в систему';
                submitBtn.innerText = 'Войти';
                usernameGroup.style.display = 'none';
                usernameInput.removeAttribute('required');
                toggleZone.innerHTML = 'Нет аккаунта? <span id="switch-mode" style="color: #38bdf8; cursor: pointer; text-decoration: underline;">Зарегистрироваться</span>';
            }
            
            initSwitchBehavior(); // Перепривязываем событие на новую кнопку
        });
    }

    // Запускаем переключатель режимов
    initSwitchBehavior();

    // Обработка отправки формы
    document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorBox = document.getElementById('error-message');
        
        // Прячем старую ошибку перед новым запросом
        errorBox.style.display = 'none';
        
        let endpoint = isSignUpMode ? '/api/auth/local/register' : '/api/auth/local';
        
        let requestBody = {
            identifier: email, 
            password: password
        };

        if (isSignUpMode) {
            const username = document.getElementById('username').value.trim();
            requestBody = {
                username: username,
                email: email,
                password: password
            };
        }

        try {
            const response = await fetch(`${STRAPI_URL}${endpoint}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();

            if (response.ok && data.jwt) {
                // Сохраняем сессию успешного юзера в браузер
                localStorage.setItem('userStatus', 'user');
                localStorage.setItem('token', data.jwt);
                localStorage.setItem('username', data.user.username);
                
                // Перенаправляем на главную без алертов
                window.location.href = 'index.html';
            } else {
                // Ловим ошибки и переводим их для вывода на плашку
                let msg = 'Неверные данные или сбой сервера';
                if (data.error && data.error.message === 'Email or Username are already taken') {
                    msg = '⚠️ Этот Email или Имя пользователя уже заняты!';
                } else if (data.error && data.error.message === 'Invalid identifier or password') {
                    msg = '❌ Неверный Email или пароль!';
                } else if (data.error) {
                    msg = data.error.message;
                }

                // Показываем плашку с текстом ошибки
                errorBox.innerText = msg;
                errorBox.style.display = 'block';
            }

        } catch (error) {
            console.error('Ошибка запроса:', error);
            errorBox.innerText = '🤖 Не удалось связаться с сервером. Проверь сеть!';
            errorBox.style.display = 'block';
        }
    });

    function saveGuestAndGo() {
        localStorage.setItem('userStatus', 'guest');
        localStorage.setItem('username', 'Гость');
        window.location.href = 'index.html';
    }
</script>

</body>
</html>
